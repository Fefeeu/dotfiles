# Regra Geral
windowrule = suppressevent maximize, class:.*
windowrulev2 = rounding 0, fullscreen:1

# Regras para Jogos (Steam)
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = idleinhibit always, class:^(steam_app_.*)$
windowrulev2 = minsize 1 1, class:^(steam_app_.*)$
windowrulev2 = noblur, class:^(steam_app_.*)$
windowrulev2 = opaque, class:^(steam_app_.*)$
windowrulev2 = noborder, class:^(steam_app_.*)$
windowrulev2 = rounding 0, class:^(steam_app_.*)$

# Fix XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
