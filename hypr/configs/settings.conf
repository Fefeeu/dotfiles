monitor=,1920x1080@72,auto,1

$terminal = kitty
$fileManager = dolphin
$menu = ~/.config/rofi/launchers/type-3/launcher.sh

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

input {
    kb_layout = br, us
    follow_mouse = 1
    sensitivity = -0.25 
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

device {
    name = compx-kysona-m600
    kb_layout = us,br
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

gesture = 3, horizontal, workspace
